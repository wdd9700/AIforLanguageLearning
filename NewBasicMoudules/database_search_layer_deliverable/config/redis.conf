# =====================================================
# AI外语学习系统 - Redis 配置文件
# 版本: 1.0.0
# 描述: Redis 7.x 开发环境配置
# =====================================================

# =====================================================
# 基础配置
# =====================================================

# 绑定地址（允许所有接口访问，生产环境应限制）
bind 0.0.0.0

# 端口
port 6379

# 保护模式（Docker环境需要关闭）
protected-mode no

# 日志级别: debug, verbose, notice, warning
loglevel notice

# 日志文件（空字符串表示输出到stdout）
logfile ""

# 数据库数量
databases 16

# =====================================================
# 内存配置
# =====================================================

# 最大内存限制（256MB）
maxmemory 256mb

# 内存淘汰策略: allkeys-lru 适用于缓存场景
# 可选策略:
#   noeviction      - 不淘汰，直接返回错误
#   allkeys-lru     - 所有键中淘汰最近最少使用的
#   volatile-lru    - 在设置了过期时间的键中淘汰LRU
#   allkeys-random  - 所有键中随机淘汰
#   volatile-random - 设置了过期时间的键中随机淘汰
#   volatile-ttl    - 淘汰即将过期的键
#   allkeys-lfu     - 所有键中淘汰使用频率最低的
#   volatile-lfu    - 设置了过期时间的键中淘汰LFU
maxmemory-policy allkeys-lru

# 内存采样数量（用于LRU/LFU近似算法）
maxmemory-samples 5

# =====================================================
# 持久化配置 (RDB)
# =====================================================

# 启用RDB持久化
save 900 1      # 900秒内至少有1个key变化则保存
save 300 10     # 300秒内至少有10个key变化则保存
save 60 10000   # 60秒内至少有10000个key变化则保存

# RDB文件名称
dbfilename dump.rdb

# RDB文件保存目录
dir /data

# 如果后台保存出错，停止写入操作
stop-writes-on-bgsave-error yes

# 使用LZF压缩RDB文件
rdbcompression yes

# 校验RDB文件CRC64校验和
rdbchecksum yes

# =====================================================
# AOF持久化配置（可选，开发环境可关闭）
# =====================================================

# 禁用AOF（开发环境使用RDB即可）
appendonly no

# AOF文件名
appendfilename "appendonly.aof"

# AOF同步策略: always, everysec, no
# appendfsync everysec

# 自动重写AOF文件
# auto-aof-rewrite-percentage 100
# auto-aof-rewrite-min-size 64mb

# =====================================================
# 连接配置
# =====================================================

# 最大客户端连接数
maxclients 1000

# TCP连接队列长度
tcp-backlog 511

# TCP keepalive
tcp-keepalive 300

# 客户端超时（0表示不超时）
timeout 0

# TCP连接空闲超时
tcp-idle-timeout 0

# =====================================================
# 安全配置（开发环境简化配置）
# =====================================================

# 密码认证（生产环境建议启用）
# requirepass your_password_here

# 命令重命名（禁用危险命令）
# rename-command FLUSHALL ""
# rename-command FLUSHDB ""
# rename-command CONFIG ""

# =====================================================
# 慢查询日志
# =====================================================

# 慢查询阈值（微秒）
slowlog-log-slower-than 10000

# 慢查询日志长度
slowlog-max-len 128

# =====================================================
# 事件通知
# =====================================================

# 键空间事件通知
# notify-keyspace-events "Ex"  # 过期事件
notify-keyspace-events ""

# =====================================================
# 性能优化
# =====================================================

# 哈希表最大条目数（超过则使用标准内存分配）
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# 列表最大压缩深度
list-max-ziplist-size -2

# 集合最大整数条目数
set-max-intset-entries 512

# 有序集合最大压缩条目数
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog稀疏表示最大字节数
hll-sparse-max-bytes 3000

# 流节点最大字节数
stream-node-max-bytes 4096
stream-node-max-entries 100

# 主动重新哈希
activerehashing yes

# 客户端输出缓冲区限制
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# =====================================================
# 复制配置（单节点不需要）
# =====================================================

# replicaof <masterip> <masterport>
# replica-read-only yes

# =====================================================
# 集群配置（单节点不需要）
# =====================================================

# cluster-enabled no
# cluster-config-file nodes-6379.conf
# cluster-node-timeout 15000

# =====================================================
# 时区配置
# =====================================================

# 使用系统时区
timezone Asia/Shanghai
