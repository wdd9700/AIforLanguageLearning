version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aifl_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aifl_user
      POSTGRES_PASSWORD: aifl_password
      POSTGRES_DB: aifl_db
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init_postgres.sql:ro
      - ./data/postgres/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aifl_user -d aifl_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aifl_network
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c maintenance_work_mem=64MB
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=8MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c max_connections=200

  redis:
    image: redis:7-alpine
    container_name: aifl_redis
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - aifl_network
    command: redis-server /usr/local/etc/redis/redis.conf

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: aifl_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - TZ=Asia/Shanghai
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - aifl_network
    command: >
      bash -c '
        if [ ! -d /usr/share/elasticsearch/plugins/analysis-ik ]; then
          echo "Installing IK analysis plugin..." &&
          bin/elasticsearch-plugin install --batch https://github.com/medcl/elasticsearch-analysis-ik/releases/download/v8.11.0/elasticsearch-analysis-ik-8.11.0.zip;
        fi &&
        if [ ! -d /usr/share/elasticsearch/plugins/analysis-pinyin ]; then
          echo "Installing Pinyin analysis plugin..." &&
          bin/elasticsearch-plugin install --batch https://github.com/medcl/elasticsearch-analysis-pinyin/releases/download/v8.11.0/elasticsearch-analysis-pinyin-8.11.0.zip;
        fi &&
        exec /usr/local/bin/docker-entrypoint.sh eswrapper
      '

  kibana:
    image: kibana:8.11.0
    container_name: aifl_kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=["http://elasticsearch:9200"]
      - xpack.security.enabled=false
      - TZ=Asia/Shanghai
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - aifl_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local

networks:
  aifl_network:
    driver: bridge
    name: aifl_network
