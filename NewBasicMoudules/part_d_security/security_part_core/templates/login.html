<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI外语学习系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="form-box">
            <h1>用户登录</h1>
            <p class="subtitle">AI外语学习系统安全认证演示</p>

            <form id="loginForm">
                <div class="input-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required 
                           placeholder="请输入用户名" minlength="3" maxlength="50">
                </div>
                
                <div class="input-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required 
                           placeholder="请输入密码" minlength="8" maxlength="128">
                    <span class="toggle-password" onclick="togglePassword('password')">显示/隐藏</span>
                </div>
                
                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">记住我</label>
                </div>
                
                <button type="submit" class="btn btn-primary">
                    <span class="btn-text">登录</span>
                    <span class="btn-loading" style="display: none;">登录中...</span>
                </button>
            </form>
            
            <div class="links">
                <p>还没有账号？<a href="/register">立即注册</a></p>
                <p><a href="#" onclick="alert('Please contact admin to reset password')">忘记密码？</a></p>
            </div>
            
            <div class="security-info">
                <h3>安全措施</h3>
                <ul>
                    <li>密码使用 PBKDF2 哈希存储</li>
                    <li>JWT Token 身份认证（双 HttpOnly Cookie）</li>
                    <li>Redis 存储 Refresh Token</li>
                    <li>登录限流（5分钟5次）</li>
                    <li>CSRF 防护</li>
                </ul>
            </div>
        </div>
    </div>
    
    <div id="message" class="message" style="display: none;"></div>
    
    <script src="/static/js/auth_secure.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = e.target.querySelector('button[type="submit"]');
            const btnText = btn.querySelector('.btn-text');
            const btnLoading = btn.querySelector('.btn-loading');
            
            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'inline';
            
            try {
                const result = await login(username, password);
                
                if (result.success) {
                    showMessage('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showMessage(result.message || 'Login failed', 'error');
                }
            } catch (error) {
                showMessage('Network error, please try again later', 'error');
            } finally {
                btn.disabled = false;
                btnText.style.display = 'inline';
                btnLoading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
