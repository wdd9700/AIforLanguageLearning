<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - AI外语学习系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="form-box">
            <h1>用户注册</h1>
            <p class="subtitle">创建你的学习账号</p>

            <form id="registerForm">
                <div class="input-group">
                    <label for="username">用户名 <span class="required">*</span></label>
                    <input type="text" id="username" required placeholder="3-50字符" minlength="3" maxlength="50">
                </div>

                <div class="input-group">
                    <label for="email">邮箱 <span class="required">*</span></label>
                    <input type="email" id="email" required placeholder="example@email.com">
                </div>

                <div class="input-group">
                    <label for="password">密码 <span class="required">*</span></label>
                    <input type="password" id="password" required placeholder="8-128字符">
                </div>

                <div class="input-group">
                    <label for="confirm_password">确认密码 <span class="required">*</span></label>
                    <input type="password" id="confirm_password" required placeholder="再次输入密码">
                </div>

                <div class="password-requirements">
                    <p>密码要求：至少8位，包含大写、小写字母与数字</p>
                </div>

                <button type="submit" class="btn btn-primary">注册</button>
            </form>

            <div class="links">
                <p>已有账号？ <a href="/login">去登录</a></p>
            </div>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        var username = document.getElementById('username').value;
        var email = document.getElementById('email').value;
        var password = document.getElementById('password').value;
        var confirm = document.getElementById('confirm_password').value;

        if (password !== confirm) {
            alert('Passwords do not match');
            return;
        }

        if (password.length < 8 || !/[A-Z]/.test(password) || !/[a-z]/.test(password) || !/\d/.test(password)) {
            alert('Password does not meet requirements');
            return;
        }

        try {
            var result = await register(username, email, password);
            if (result.success) {
                alert('Registration successful');
                window.location.href = '/login';
            } else {
                alert(result.message || 'Registration failed');
            }
        } catch (err) {
            alert('Network error');
        }
    });
    </script>
</body>
</html>
